<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>RHCraft</title>
        <link rel="stylesheet" href="../css/styles.css" />
    </head>
    <body>
        <canvas id="canvas"></canvas>

        <div id="backdrop" class="backdrop hidden">
            <div class="modal">
                <button onclick="menu.export()" class="export" type="button">Export map</button>
                <div class="import">
                    <label for="file" class="import-input">Select file</label>
                    <input id="file" class="hidden" type="file" accept=".json" />
                    <button onclick="menu.import()" class="import-button" type="button">Import map</button>
                </div>
            </div>
        </div>

        <div id="blocks" class="backdrop hidden">
            <div class="modal scrollY">
                <div id="select-blocks" class="select-blocks"></div>
            </div>
        </div>

        <script src="../js/canvas.js"></script>
        <script src="../js/camera.js"></script>
        <script src="../js/map.js"></script>
        <script src="../js/buildings.js"></script>
        <script src="../js/player.js"></script>
        <script src="../js/backpack.js"></script>
        <script src="../js/gun.js"></script>
        <script src="../js/aim.js"></script>
        <script src="../js/game.js"></script>
        <script src="../js/import_or_export_map.js"></script>

        <script src="../js/selectBlocks.js"></script>
        <script src="../js/pc/input.js"></script>

        <script src="/socket.io/socket.io.js"></script>
        <script src="../js/multiplayer.js"></script>
    </body>
</html>
