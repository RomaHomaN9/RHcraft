<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <canvas id="canvas"></canvas>

        <script>
            // Отримуємо контекст малювання
            const canvas = document.getElementById("canvas");
            const ctx = canvas.getContext("2d");
            const width = canvas.width;
            const height = canvas.height;

            // 1. Функція відстані для кола (SDF)
            // p - координати пікселя, c - центр, r - радіус
            function sdCircle(p, r) {
                const distance = Math.sqrt(p.x * p.x + p.y * p.y);
                return distance - r;
            }

            // 2. Функція для малювання кадру
            function draw() {
                const imageData = ctx.createImageData(width, height);

                for (let y = 0; y < height; y++) {
                    for (let x = 0; x < width; x++) {
                        // Переносимо координати так, щоб (0,0) був у центри
                        const p = { x: x - width / 2, y: y - height / 2 };

                        // Отримуємо відстань до кола радіусом 100
                        const d = sdCircle(p, 100);

                        // Визначаємо колір пікселя
                        const index = (y * width + x) * 4;

                        // Якщо d < 0, ми всередині кола (білий колір)
                        // Якщо d > 0, ми ззовні (чорний колір)
                        const color = d < 0 ? 255 : 0;

                        imageData.data[index] = color; // Red
                        imageData.data[index + 1] = color; // Green
                        imageData.data[index + 2] = color; // Blue
                        imageData.data[index + 3] = 255; // Alpha
                    }
                }
                ctx.putImageData(imageData, 0, 0);
            }

            draw();
        </script>
    </body>
</html>
